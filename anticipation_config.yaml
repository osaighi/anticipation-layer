# Anticipation Layer Configuration
# Copy this file and adjust to your needs.

horizons:
  short_term:
    range_days: [1, 7]
    ttl_hours: 48
    decay_lambda: 0.3
    refresh: "daily"
  medium_term:
    range_days: [30, 90]
    ttl_hours: 336        # 2 weeks
    decay_lambda: 0.05
    refresh: "weekly"
  long_term:
    range_days: [180, 365]
    ttl_hours: 1440       # ~2 months
    decay_lambda: 0.01
    refresh: "monthly"

update_engine:
  invalidation_threshold: 0.5
  cascade_threshold_short: 0.3
  cascade_threshold_medium: 0.5
  weight_floor: 0.3

context_injection:
  top_k: 10
  min_relevance: 0.1
  max_tokens: 500

consolidation:
  idle_timeout_seconds: 300
  max_new_anticipations: 5
  confidence_boost_per_cycle: 0.05
